  /api/v1/workflow/public/scheduled:
    get:
      operationId: listSchedules
      tags:
      - Schedules
      summary: List schedules
      description: List the scheduled triggers registered for a linked account, paginated.
      security:
      - ApiKeyAuth: []
      parameters:
      - name: linked_account_id
        in: header
        required: true
        description: The linked account whose schedules to list.
        schema:
          type: string
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
      responses:
        '200':
          description: Paginated list of schedules.
          content:
            application/json:
              schema:
                type: object
                properties:
                  docs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schedule'
                  totalDocs:
                    type: integer
                  limit:
                    type: integer
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  hasNextPage:
                    type: boolean
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentedError'
    post:
      operationId: registerSchedule
      tags:
      - Schedules
      summary: Register a schedule
      description: Register a scheduled trigger that runs a workflow on a cron expression or at specific
        interval date/times.
      security:
      - ApiKeyAuth: []
      parameters:
      - name: linked_account_id
        in: header
        required: true
        description: The linked account that will run the scheduled workflow.
        schema:
          type: string
      - name: slug
        in: header
        required: true
        description: The application slug the workflow belongs to.
        schema:
          type: string
          example: hubspot
      - name: workflow_id_alias
        in: header
        required: true
        description: The workflow ID to execute on schedule.
        schema:
          type: string
      - name: config_id
        in: header
        required: true
        description: The config to run under. Defaults to the linked account ID.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - trigger_type
              properties:
                trigger_type:
                  type: string
                  enum:
                  - cron
                  - interval
                  description: '`cron` for recurring schedules, `interval` for specific date/times.'
                regex:
                  type: string
                  description: (cron) The cron expression. Stored on the schedule as `cron_patten`.
                interval_dates:
                  type: array
                  description: (interval) Specific date/time objects.
                  items:
                    type: object
                    properties:
                      day:
                        type: integer
                      month:
                        type: integer
                      year:
                        type: integer
                      hour:
                        type: integer
                      minute:
                        type: integer
                startDate:
                  type: string
                  description: Earliest date the schedule may run (YYYY-MM-DD).
                endDate:
                  type: string
                  description: Latest date the schedule may run (YYYY-MM-DD).
                tz:
                  type: string
                  description: Timezone, e.g. UTC, America/New_York.
                payload:
                  type: object
                  additionalProperties: true
                  description: Event payload passed to the workflow on each run.
            examples:
              cron:
                summary: Cron schedule
                value:
                  trigger_type: cron
                  regex: 0 9 * * 1
                  tz: UTC
                  startDate: '2026-07-01'
                  payload:
                    sync_type: full
              interval:
                summary: Interval schedule
                value:
                  trigger_type: interval
                  interval_dates:
                  - day: 1
                    month: 7
                    year: 2026
                    hour: 9
                    minute: 0
                  tz: UTC
      responses:
        '200':
          description: The created schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentedError'
  /api/v1/workflow/public/scheduled/{schedule_id}:
    put:
      operationId: updateSchedule
      tags:
      - Schedules
      summary: Update a schedule
      description: Update an existing schedule's cron expression, interval dates, date window, timezone,
        or payload.
      security:
      - ApiKeyAuth: []
      parameters:
      - name: linked_account_id
        in: header
        required: true
        schema:
          type: string
      - name: schedule_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger_type:
                  type: string
                  enum:
                  - cron
                  - interval
                regex:
                  type: string
                interval_dates:
                  type: array
                  items:
                    type: object
                startDate:
                  type: string
                endDate:
                  type: string
                tz:
                  type: string
                payload:
                  type: object
                  additionalProperties: true
            example:
              trigger_type: cron
              regex: 0 10 * * 1
              tz: UTC
      responses:
        '200':
          description: The updated schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '404':
          description: Schedule not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentedError'
    delete:
      operationId: deleteSchedule
      tags:
      - Schedules
      summary: Delete a schedule
      description: Permanently delete a schedule and deregister its job.
      security:
      - ApiKeyAuth: []
      parameters:
      - name: linked_account_id
        in: header
        required: true
        schema:
          type: string
      - name: schedule_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Confirmation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Schedule not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentedError'
  /api/v1/workflow/public/scheduled/{schedule_id}/pause:
    put:
      operationId: pauseSchedule
