# Refold Public API — OpenAPI 3.1 specification.
# Generated: rebranded + merged from documented endpoints; contains only documented, customer-facing operations.
openapi: 3.1.0
info:
  title: Refold Public API
  version: 1.0.0
  description: The Refold public REST API. Manage linked accounts, generate hosted Connect and OAuth URLs,
    issue session tokens, subscribe to webhooks, discover and execute application actions, build and run
    workflows, and work with configs, tables, datarefs, environment variables, events, and MCP servers.
    Authenticate with your organization API key or a linked-account session token.
  contact:
    name: Refold
    url: https://www.refold.ai
servers:
- url: https://app.refold.ai
  description: Refold API
tags:
- name: Applications
  description: Discover the applications enabled for your organization and a linked account's connection
    status.
- name: Auth Structure
  description: Inspect an application's authentication fields.
- name: Hosted Connect
  description: Generate hosted Connect URLs for end-user authentication.
- name: Credentials
  description: Read and write integration credentials and tokens.
- name: Hosted Properties
  description: Properties stored for hosted Connect pages.
- name: Linked Accounts
  description: Manage linked accounts (your customers) and their integrations.
- name: OAuth
  description: Generate OAuth authorization URLs for linked-account integrations.
- name: Session Tokens
  description: Generate and revoke session tokens for a linked account.
- name: Webhooks
  description: Subscribe to organization-level event notifications.
- name: Events
  description: Define custom events and fire them to start workflows.
- name: Config Fields
  description: Read and set config field values.
- name: Configs
  description: Install and configure applications per linked account.
- name: Datarefs
  description: Manage reference-data tables for a linked account.
- name: Datastores
  description: Read and search per-config datastores.
- name: Environment Variables
  description: Manage variable definitions and scoped values.
- name: Executions
  description: Retrieve, stop, and rerun workflow executions.
- name: Human Tasks
  description: Retrieve and submit human-in-the-loop forms.
- name: MCP Servers
  description: Manage MCP servers.
- name: Persistent Tables
  description: Create and manage API-managed tables, columns, and records.
- name: Workflows
  description: Manage, publish, and execute workflows.
- name: Schedules
  description: Run workflows on cron or interval triggers.
- name: Actions
  description: Discover and execute application actions on a connected account.
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Organization API key, sent in the `x-api-key` header. Production keys start with `pk`,
        test keys with `tk`.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token. Use for linked-account-scoped requests; linked-account session tokens
        are issued by `POST /session-token`.
  parameters:
    LinkedAccountIdHeader:
      name: linked_account_id
      in: header
      required: false
      description: 'Linked-account id. Required when authenticating via `x-api-key` for routes

        that are scoped to a single linked account. Ignored if the route is path-scoped

        or a Bearer JWT already carries the linked-account id.

        '
      schema:
        type: string
    SlugHeader:
      name: slug
      in: header
      required: true
      description: Application slug, passed as a header (not in the URL).
      schema:
        type: string
    ConfigIdHeader:
      name: config_id
      in: header
      required: false
      description: Config id (used by some event-fire and workflow-execute routes).
      schema:
        type: string
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 10
  schemas:
    GenericSuccess:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
    PaginationMetadata:
      type: object
      properties:
        totalDocs:
          type: integer
        limit:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean
        nextPage:
          type: integer
          nullable: true
        prevPage:
          type: integer
          nullable: true
        pagingCounter:
          type: integer
    UDFEntry:
      type: object
      properties:
        key_name:
          type: string
        key_value:
          type: string
    OauthCredentials:
      type: object
      additionalProperties: true
      description: 'Optional OAuth metadata for an integration. Concrete fields are app-specific

        but commonly include `client_id`, `client_secret`, `callback_url`, `environment`,

        `api_account_id`, `account_base_uri`, `token_base_uri`, `api_base_url`,

        `auth_base_url`, `app_id`, `tenant_id`.

        '
    IntegrationBase:
      type: object
      description: 'A connected integration on a linked account. `credentials`, `authTokens`, and

        `connections` are stripped from most read responses; raw tokens are only

        available via `GET /linked-account/credentials/...` or `GET /token/...`.

        '
      properties:
        _id:
          type: string
        type:
          type: string
          description: Integration type (slug, IntegrationsEnum value)
        name:
          type: string
        icon:
          type: string
          nullable: true
        identifier: {}
        app_id:
          type: string
          nullable: true
        credentials:
          $ref: '#/components/schemas/OauthCredentials'
        authTokens:
          description: Encrypted token map. Absent in most public reads.
        refresh_token_expired:
          type: boolean
        reauth_required:
          type: boolean
        connections:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LinkedAccount:
      type: object
      properties:
        _id:
          type: string
        associated_org:
          type: string
        account_id:
          type: string
        name:
          type: string
        environment:
          type: string
          enum:
          - test
          - production
        udf:
          type: array
          items:
            $ref: '#/components/schemas/UDFEntry'
        is_seed:
          type: boolean
        tenant_account_id:
          type: string
          nullable: true
        integrations:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationBase'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginatedLinkedAccounts:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/LinkedAccount'
    CreateLinkedAccountRequest:
      type: object
      description: Provide either `account_id` or `linked_account_id`. Use `your_app.auth_credentials`
        to seed the default custom-app integration, and `udf` for custom key/value fields.
      properties:
        account_id:
          type: string
        linked_account_id:
          type: string
          description: Alias for `account_id`
        name:
          type: string
        your_app:
          type: object
          properties:
            auth_credentials:
              type: object
              additionalProperties:
                type: string
          required:
          - auth_credentials
        udf:
          type: object
          additionalProperties:
            type: string
    UpsertLinkedAccountRequest:
      type: object
      description: 'Upsert payload. Fields may either be nested under `payload` or supplied flat.

        If `payload` is present it takes precedence over flat fields.

        '
      properties:
        account_id:
          type: string
        linked_account_id:
          type: string
        payload:
          type: object
          properties:
            name:
              type: string
            your_app:
              type: object
              properties:
                auth_credentials:
                  type: object
                  additionalProperties:
                    type: string
            udf:
              type: object
              additionalProperties:
                type: string
        name:
          type: string
        your_app:
          type: object
          properties:
            auth_credentials:
              type: object
              additionalProperties:
                type: string
        udf:
          type: object
          additionalProperties:
            type: string
    RefoldWebhook:
      type: object
      properties:
        _id:
          type: string
        org_id:
          type: string
        environment:
          type: string
          enum:
          - test
          - production
        is_enabled:
          type: boolean
        webhook_events:
          type: array
          items:
            type: string
        slug:
          type: string
        description:
          type: string
        workflow_ids:
          type: array
          items:
            type: string
        webhook_url:
          type: string
          format: uri
        webhook_description:
          type: string
        webhook_body: {}
        webhook_headers:
          type: object
          additionalProperties: true
        method:
          type: string
          enum:
          - POST
          - PUT
          - PATCH
        group:
          type: string
        webhook_type:
          type: string
          description: Computed at read time — one of `default`, `slack`, `custom`.
          enum:
          - default
          - slack
          - custom
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RegisterWebhookRequest:
      type: object
      required:
      - webhook_url
      - webhook_events
      properties:
        webhook_url:
          type: string
          format: uri
          pattern: ^https?://
        webhook_events:
          type: array
          minItems: 1
          items:
            type: string
        webhook_headers:
          type: object
          additionalProperties: true
        webhook_body: {}
        webhook_description:
          type: string
        description:
          type: string
        method:
          type: string
          enum:
          - POST
          - PUT
          - PATCH
          default: POST
        slug:
          type: string
          description: If set, only workflow-type events are allowed.
        workflow_ids:
          type: array
          items:
            type: string
        webhook_type:
          type: string
          enum:
          - default
          - slack
          - custom
        is_enabled:
          type: boolean
          default: true
        group:
          type: string
    UpdateWebhookRequest:
      type: object
      properties:
        webhook_events:
          type: array
          items:
            type: string
        webhook_url:
          type: string
          format: uri
          pattern: ^https?://
        is_enabled:
          type: boolean
        webhook_type:
          type: string
          enum:
          - default
          - slack
          - custom
        webhook_headers:
          type: object
          additionalProperties: true
        webhook_body: {}
        slug:
          type: string
        description:
          type: string
        workflow_ids:
          type: array
          items:
            type: string
        method:
          type: string
          enum:
          - POST
          - PUT
          - PATCH
    UpdateWebhooksGroupRequest:
      type: object
      required:
      - webhookIds
      properties:
        webhookIds:
          type: array
          minItems: 1
          items:
            type: string
        group:
          type: string
          description: Empty string / falsy unsets the group.
    SessionTokenRequest:
      type: object
      required:
      - linked_account_id
      properties:
        linked_account_id:
          type: string
    SessionTokenResponse:
      type: object
      description: 'Returned shape varies. Standard issuance returns `token`/`refresh_token`/expiries.

        API-token issuance (not exposed via this public route) returns `{token, is_api_token: true}`.

        '
      properties:
        token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        refresh_expires_in:
          type: integer
        is_api_token:
          type: boolean
    RevokeSessionTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        revoked_count:
          type: integer
          enum:
          - 0
          - 1
    ConnectUrlResponse:
      type: object
      properties:
        hosted_url:
          type: string
          format: uri
    OAuthUrlResponse:
      type: object
      properties:
        auth_url:
          type: string
          format: uri
    ApplicationItem:
      type: object
      description: 'Application as seen by a linked account. Augmented with `connected`/`connected_accounts`.

        Upstream fields (from the workflow-service application document) are passed through.

        '
      properties:
        _id:
          type: string
        type:
          type: string
        slug:
          type: string
        app_id:
          type: string
        name:
          type: string
        icon:
          type: string
        auth_type:
          type: string
        connected:
          type: boolean
        connected_accounts:
          type: array
          items:
            type: object
            properties:
              identifier:
                type: string
              defaultCredentials: {}
              auth_type:
                type: string
              connectedAt:
                type: string
                format: date-time
              status:
                type: string
        reauth_required:
          type: boolean
        webhook_url:
          type: string
          format: uri
          description: Only populated for greenhouse / freshdesk / helpscout.
      additionalProperties: true
    UpsertDefaultAppCredentialRequest:
      type: object
      required:
      - value
      properties:
        value:
          description: Credential value; coerced to string before encryption.
    DefaultAppCredentialActionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        action:
          type: string
          enum:
          - added
          - updated
    MigrateTokenRequest:
      type: object
      required:
      - slug
      - auth_object
      properties:
        slug:
          type: string
          description: App slug being migrated.
        auth_object:
          type: object
          additionalProperties: true
          description: 'Object with exactly one top-level key naming the auth type (`oauth2`, `keybased`,
            ...).

            Value is an object whose fields match the app''s auth-type schema (verified at runtime).

            '
    MigrateTokenResponse:
      type: object
      description: On success returns `{success, message}`. Some validation failures return `{error}`
        with an HTTP 200 status.
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
    AuthStructureResponse:
      type: object
      additionalProperties:
        type: object
        additionalProperties: true
      description: 'Map from auth-type (`oauth2`, `keybased`, ...) to a field-shape map. Each field''s

        value is either the type string (e.g. `"string"`) or `{type, required: false}`

        when the field is optional. Custom apps return `{}`.

        '
    DeleteLinkedAccountResponse:
      type: object
      properties:
        message:
          type: string
          example: User deleted successfully
    MessageOnly:
      type: object
      properties:
        message:
          type: string
    WorkflowNode:
      type: object
      additionalProperties: true
      description: 'A workflow node. Concrete shape depends on `node_type` and includes fields

        like `id`, `data`, `position`, plus runtime-stripped status fields.

        '
    WorkflowEdge:
      type: object
      additionalProperties: true
    WorkflowSettings:
      type: object
      additionalProperties: true
      properties:
        caching:
          type: object
          additionalProperties: true
        workflow_response:
          type: object
          additionalProperties: true
        timeout:
          type: integer
        incremental_sync_settings:
          type: object
          additionalProperties: true
    Workflow:
      type: object
      description: 'Workflow document. Many fields are populated lazily and some are stripped

        from public reads (e.g. `linked_account_id` is removed from `getWorkflowById`).

        '
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        slug:
          type: string
        org_id:
          type: string
        environment:
          type: string
          enum:
          - test
          - production
        linked_account_id:
          type: string
        published:
          type: boolean
        autoEnable:
          type: boolean
        hide_in_config:
          type: boolean
        workflow_alias:
          type: string
        public_access_workflow:
          type: boolean
        associated_application:
          type: string
        associated_project:
          type: string
        is_v2:
          type: boolean
        settings:
          $ref: '#/components/schemas/WorkflowSettings'
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
        json_schema:
          type: object
          additionalProperties: true
        manual_execution_payload: {}
        group:
          type: string
        version:
          type: integer
        current_version:
          type: integer
        expose_as_node:
          type: boolean
        data_slots:
          type: array
          items:
            type: object
            additionalProperties: true
        udf_filter:
          type: string
        udf_filter_operator:
          type: string
        created_by_ai:
          type: boolean
        index_order:
          type: integer
        workflow_builder_version:
          type: string
        when_to_use:
          type: string
        test_instance_meta_data:
          type: object
          additionalProperties: true
        event_schema_guidelines:
          type: string
        is_agentic_flow:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginatedWorkflows:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/Workflow'
          schema:
            type: object
            additionalProperties: true
            description: Merged JSON schema generated at response time across docs.
    EnabledWorkflowSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        config_id:
          type: string
        application:
          type: object
          additionalProperties: true
    Instance:
      type: object
      additionalProperties: true
      description: 'Execution instance. Populated nodes/edges/status; runtime structure varies.

        '
      properties:
        _id:
          type: string
        name:
          type: string
        status:
          type: string
        associated_event_id:
          type: string
        associated_workflow:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
            icon:
              type: string
        associated_trigger_application:
          type: object
          additionalProperties: true
        trigger_application_event:
          type: string
        custom_application_id:
          type: string
        custom_trigger_id:
          type: string
        linked_account_id:
          type: string
        config_id:
          type: string
        store_variables:
          type: object
          additionalProperties: true
        linked_account_data:
          type: object
          additionalProperties: true
        completion_time:
          type: string
          format: date-time
        is_child_instance:
          type: boolean
        custom_field_values:
          type: object
          additionalProperties: true
        is_seed:
          type: boolean
        executed_by_thanos:
          type: boolean
        environment:
          type: string
          enum:
          - test
          - production
        org_id:
          type: string
        type_of_execution:
          type: string
        instance_execution_time:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginatedInstances:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/Instance'
    InstanceBatch:
      type: object
      additionalProperties: true
      description: Batch sub-execution within a fan-out node.
    PaginatedInstanceBatches:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/InstanceBatch'
    InstanceExecutionResult:
      type: object
      description: Result returned by `POST /workflow/{workflowId}/execute`.
      properties:
        execution_id:
          type: string
        return_value:
          description: Workflow-author-defined payload.
        errored:
          type: boolean
        status_code:
          type: integer
        executed_by_thanos:
          type: boolean
        execution_error:
          type: object
          additionalProperties: true
    MCPCrud:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        agent_name:
          type: string
        primary_color:
          type: string
        secondary_color:
          type: string
        base_prompt:
          type: string
        safe_mode:
          type: boolean
        suggestions:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              prompt:
                type: string
        description:
          type: string
        associated_org_id:
          type: string
        associated_apps:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              workflows:
                type: array
                items:
                  type: string
              actions:
                type: array
                items:
                  type: string
        chains:
          type: array
          items:
            type: object
            additionalProperties: true
        notebooks:
          type: array
          items:
            type: object
            additionalProperties: true
        environment:
          type: string
          enum:
          - test
          - production
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginatedMcpServers:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/MCPCrud'
    CreateMcpServerRequest:
      type: object
      required:
      - name
      - description
      properties:
        name:
          type: string
        description:
          type: string
    UpdateMcpServerRequest:
      type: object
      description: 'Patch-style. Only the supplied fields are written.

        '
      properties:
        name:
          type: string
        description:
          type: string
        associated_apps:
          type: array
          items:
            type: object
            additionalProperties: true
        suggestions:
          type: array
          items:
            type: object
            additionalProperties: true
        agent_name:
          type: string
        primary_color:
          type: string
        secondary_color:
          type: string
        chains:
          type: array
          items:
            type: object
            additionalProperties: true
        base_prompt:
          type: string
        safe_mode:
          type: boolean
    McpServerCreatedResponse:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
    IFieldInConfig:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        help_text:
          type: string
        parent:
          type: string
        value: {}
        required:
          type: boolean
        field_type:
          type: string
        options:
          type: array
          items:
            type: object
            additionalProperties: true
        dynamic_slot_identifier:
          type: string
        labels:
          type: object
          additionalProperties: true
        data_source:
          type: object
          additionalProperties: true
        rule_columns:
          type: array
          items:
            type: object
            additionalProperties: true
        mapping:
          type: object
          additionalProperties: true
        associated_page:
          type: string
        multiple:
          type: boolean
        hidden:
          type: boolean
        defaultValue: {}
    GetApplicationConfigDTO:
      type: object
      properties:
        slug:
          type: string
        config_id:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/IFieldInConfig'
        workflows:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              icon:
                type: string
              enabled:
                type: boolean
              fields:
                type: array
                items:
                  $ref: '#/components/schemas/IFieldInConfig'
              description:
                type: string
              associated_page:
                type: string
        field_errors:
          type: array
          items:
            type: object
            additionalProperties: true
    InstallApplicationConfigRequest:
      type: object
      required:
      - slug
      description: 'Install or upsert a config. Backward-compatibility note: `fields` and

        `application_data_slots` are accepted as synonyms; per-workflow `fields` and

        `data_slots` are also synonyms.

        '
      properties:
        slug:
          type: string
        config_id:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/IFieldInConfig'
        application_data_slots:
          type: array
          items:
            $ref: '#/components/schemas/IFieldInConfig'
        workflows:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              data_slots:
                type: array
                items:
                  $ref: '#/components/schemas/IFieldInConfig'
              fields:
                type: array
                items:
                  $ref: '#/components/schemas/IFieldInConfig'
              enabled:
                type: boolean
        labels:
          type: object
          additionalProperties: true
        map_fields_object:
          type: object
          additionalProperties: true
      additionalProperties: true
    ToggleWorkflowRequest:
      type: object
      required:
      - enabled
      properties:
        enabled:
          type: boolean
    ToggleWorkflowResponse:
      type: object
      properties:
        workflows:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              enabled:
                type: boolean
              data_slots:
                type: array
                items:
                  type: object
                  additionalProperties: true
    GetConfigViaBodyRequest:
      type: object
      properties:
        tenant_config:
          type: boolean
      description: Optional request body for `GET /slug/{slug}/config(/{configId})`. Only `tenant_config`
        is used.
    ConfigFieldValueRequest:
      type: object
      description: Value payload for a single config field (datasource-resolved).
      properties:
        value: {}
    RuleEngineRequest:
      type: object
      required:
      - rule_column
      properties:
        rule_column:
          type: object
          additionalProperties: true
          description: Field-shaped object describing the rule column.
    CustomTrigger:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        name:
          type: string
        response:
          type: string
        json_schema:
          type: object
          additionalProperties: true
    CreateOrUpdateEventRequest:
      type: object
      required:
      - name
      - response
      properties:
        name:
          type: string
        response:
          type: string
        json_schema:
          type: object
          additionalProperties: true
    TriggerEventJsonRequest:
      type: object
      description: 'Triggers the named event. One of `event`/`trigger` must be provided.

        '
      properties:
        event:
          type: string
        trigger:
          type: string
        payload:
          description: Arbitrary JSON payload passed to the workflow.
    WebhookFiredResponse:
      type: object
      properties:
        message:
          type: string
          example: Webhook Fired Success
    ConfigDatastoreSearchRequest:
      type: object
      additionalProperties: true
      description: 'Arbitrary `{column_name: value}` map; values are regex-matched.'
    Table:
      type: object
      properties:
        _id:
          type: string
        org_id:
          type: string
        name:
          type: string
        environment:
          type: string
          enum:
          - test
          - production
        table_type:
          type: string
        is_deleted:
          type: boolean
        associated_instance:
          type: string
        record_count:
          type: integer
        createdAt:
          type: string
          format: date-time
        group:
          type: string
    PaginatedTables:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/Table'
    CreateTableRequest:
      type: object
      required:
      - table_name
      - columns
      properties:
        table_name:
          type: string
        columns:
          type: array
          maxItems: 20
          items:
            type: object
            required:
            - column_name
            properties:
              column_name:
                type: string
    CreateTableResponse:
      type: object
      properties:
        table_id:
          type: string
        already_exists:
          type: boolean
    AddRecordsRequest:
      type: object
      required:
      - data
      properties:
        data:
          oneOf:
          - type: object
            additionalProperties: true
          - type: array
            items:
              type: object
              additionalProperties: true
    AddRecordsResponse:
      type: object
      properties:
        add_record_result:
          type: array
          items:
            type: object
            additionalProperties: true
        transformed_add_data:
          description: Unchanged copy of the inserted data, post-transform.
    TableSearchResponse:
      type: array
      items:
        type: object
        additionalProperties: true
    PersistentTableRecordsResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        name:
          type: string
        docs:
          type: array
          items:
            type: object
            additionalProperties: true
        page:
          type: integer
        limit:
          type: integer
        totalDocs:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
    ColumnsArrayRequest:
      type: object
      required:
      - columns
      properties:
        columns:
          type: array
          items:
            type: string
    ColumnsArrayResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
    RenameColumnsRequest:
      type: object
      required:
      - renames
      properties:
        renames:
          type: array
          items:
            type: object
            required:
            - old_name
            - new_name
            properties:
              old_name:
                type: string
              new_name:
                type: string
    EditTablesGroupRequest:
      type: object
      required:
      - tableIds
      properties:
        tableIds:
          type: array
          items:
            type: string
        group:
          type: string
          description: Empty / falsy unsets the field.
    Dataref:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        linked_account_id:
          type: string
        org_id:
          type: string
        environment:
          type: string
          enum:
          - test
          - production
        data:
          type: object
          additionalProperties: true
          description: '{ [record_id]: DataRefRow[] }'
        group:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginatedDatarefs:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/Dataref'
    DatarefAsTableResponse:
      type: object
      properties:
        headers:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        page:
          type: integer
        limit:
          type: integer
        totalDocs:
          type: integer
        totalPages:
          type: integer
        hasNextPage:
          type: boolean
    CreateDatarefRequest:
      type: object
      required:
      - refName
      properties:
        refName:
          type: string
    EditDatarefGroupRequest:
      type: object
      required:
      - refNames
      properties:
        refNames:
          type: array
          items:
            type: string
        group:
          type: string
    DeleteOneResult:
      type: object
      properties:
        acknowledged:
          type: boolean
        deletedCount:
          type: integer
    HumanTaskPublic:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        form_structure:
          type: object
          additionalProperties: true
        ui_structure:
          type: object
          additionalProperties: true
        group:
          type: string
        data:
          type: object
          additionalProperties: true
        expire_in:
          type: string
          format: date-time
        receiver_emails:
          type: array
          items:
            type: string
            format: email
        status:
          type: string
          enum:
          - WAITING
          - SUBMITTED
          - TIMEOUT
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SubmitHumanTaskRequest:
      type: object
      required:
      - data
      properties:
        data:
          type: object
          additionalProperties: true
    VariableDefinition:
      type: object
      properties:
        _id:
          type: string
        org_id:
          type: string
        name:
          type: string
        description:
          type: string
        scope:
          type: string
          enum:
          - org
          - workspace
          - linked_account
          - workflow
        var_format:
          type: string
          enum:
          - string
          - number
          - url
        encrypted:
          type: boolean
        created_by:
          type: string
        updated_by:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginatedVariableDefinitions:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          docs:
            type: array
            items:
              $ref: '#/components/schemas/VariableDefinition'
    VariableDefinitionWrapped:
      type: object
      properties:
        definition:
          $ref: '#/components/schemas/VariableDefinition'
    EnvVariableValue:
      type: object
      properties:
        _id:
          type: string
        variable_definition_id:
          type: string
        org_id:
          type: string
        environment:
          type: string
          enum:
          - test
          - production
        linked_account_id:
          type: string
        workflow_id:
          type: string
        value:
          type: string
          description: Returned as `[REDACTED]` when the definition is encrypted.
        created_by:
          type: string
        updated_by:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginatedEnvVariableValues:
      allOf:
      - $ref: '#/components/schemas/PaginationMetadata'
      - type: object
        properties:
          status:
            type: string
            enum:
            - success
          docs:
            type: array
            items:
              $ref: '#/components/schemas/EnvVariableValue'
    SetEnvVariableValueRequest:
      type: object
      required:
      - variable_definition_id
      - value
      properties:
        variable_definition_id:
          type: string
        value:
          type: string
        linked_account_id:
          type: string
        workflow_id:
          type: string
    GetEnvValueResponse:
      type: object
      properties:
        value:
          type: string
        encrypted:
          type: boolean
        name:
          type: string
        scope:
          type: string
          enum:
          - org
          - workspace
          - linked_account
          - workflow
        variable_definition_id:
          type: string
    DeleteEnvValueResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - success
        message:
          type: string
    CreateWorkflowRequest:
      type: object
      additionalProperties: true
      description: Workflow document. Any `Workflow` field may be supplied; Refold sets ownership and
        environment fields automatically.
    CreateWorkflowResponse:
      type: object
      properties:
        workflow:
          $ref: '#/components/schemas/Workflow'
    PublishWorkflowRequest:
      type: object
      required:
      - published
      description: '`published=true` + `version=N` publishes the *draft* as version N.

        `published=false` unpublishes. `published=true` without `version` is a normal publish.

        '
      properties:
        published:
          type: boolean
        version:
          type: integer
    DeleteWorkflowResponse:
      type: object
      properties:
        message:
          type: string
        successfullyDeletedTriggers:
          type: boolean
    GetWorkflowRequestStructureResponse:
      type: object
      properties:
        payload:
          description: Derived from `manual_execution_payload`.
        schema:
          nullable: true
          description: Workflow JSON schema if present.
        schema_interpreted:
          description: Converted/inferred shape from schema.
    Schedule:
      type: object
      description: A scheduled workflow trigger.
      properties:
        _id:
          type: string
          description: Schedule ID.
        event_id:
          type: string
          description: The event the schedule fires.
        workflow:
          description: Scheduled workflow — an ID string, or `{_id, name, associated_application}` when
            expanded.
        config_id:
          type: string
          description: The config it runs under.
        linked_account_id:
          type: string
          description: The owning linked account.
        trigger_type:
          type: string
          enum:
          - cron
          - interval
        cron_patten:
          type: string
          description: Cron expression (cron schedules).
        trigger_interval:
          type: array
          items:
            type: object
          description: Interval date objects (interval schedules).
        status:
          type: string
          enum:
          - running
          - paused
        inactive:
          type: boolean
          description: '`true` when paused.'
        registered_by_api:
          type: boolean
        options:
          type: object
          additionalProperties: true
        payload:
          type: object
          additionalProperties: true
    DocumentedError:
      type: object
      description: Standard error envelope.
      properties:
        status_code:
          type: integer
        http_error_type:
          type: string
        error_code:
          type: string
        error:
          type: string
        message:
          type: string
paths:
  /api/v2/public/application:
    get:
      operationId: listApplicationsForLinkedAccount
      tags:
      - Applications
      summary: List applications for a linked account
      description: 'Returns all enabled applications for the org+environment (delegated to the workflow

        backend), enriched with `connected` and `connected_accounts` derived from the linked

        account''s integrations. Excludes the org''s default custom application.

        '
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/LinkedAccountIdHeader'
      - name: linked_account_id
        in: query
        required: false
        schema:
          type: string
        description: Required (header or query). Headers take precedence.
      - name: slug
        in: query
        schema:
          type: string
      - name: tags
        in: query
        schema:
          type: string
      - name: ecosystem
        in: query
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      - name: auth_type
        in: query
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationItem'
  /api/v2/public/application/{slug}:
    get:
      operationId: getApplicationBySlug
      tags:
      - Applications
      summary: Get a single application by slug
      description: 'Same handler as `GET /application`, but returns only the first match when filtering

        by slug — i.e. a single application object, not an array.

        '
      security:
      - ApiKeyAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/LinkedAccountIdHeader'
      - name: linked_account_id
        in: query
        required: false
        schema:
          type: string
      - name: tags
        in: query
        schema:
          type: string
      - name: ecosystem
        in: query
        schema:
          type: string
          enum:
          - 'true'
          - 'false'
      - name: auth_type
        in: query
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationItem'
  /api/v2/public/auth-structure/{slug}:
    get:
      operationId: getAuthStructureForApp
      tags:
      - Auth Structure
      summary: Get the auth schema structure for an app
      description: 'Returns a flat description of the auth fields required for each `app_auth_type`

        (e.g. `oauth2`, `keybased`) for the given app slug. Each entry''s value is either

        the type string or `{type, required: false}` for optional fields. **This route

        has no authentication middleware.**

        '
      security: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStructureResponse'
  /api/v2/public/connect-url:
    post:
      operationId: createConnectUrl
      tags:
      - Hosted Connect
      summary: Create a hosted Connect URL
      description: Creates a hosted Connect URL of the form `{base_app_url}/connect/{token}` (optionally
        with `?config_id=...`). Any properties in the request body are stored with the session and returned
        to the hosted page via `GET /hosted-properties`.
      security:
      - BearerAuth: []
      parameters:
      - name: linked_account_id
        in: query
        required: true
        schema:
          type: string
      - name: config_id
        in: query
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Optional properties stored with the Connect session and returned by `GET /hosted-properties`.
                Common keys used by hosted pages include `base_color`, `button_color`, and `redirect_url`;
                none are required.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectUrlResponse'
  /api/v2/public/linked-account/default-app/auth-credentials/{key}:
    put:
      operationId: upsertDefaultAppAuthCredential
      tags:
      - Credentials
      summary: Upsert one auth credential on the org's default app
      description: 'Adds or updates a single `{key_name, key_value}` auth credential on the org''s

        default-app integration for the linked account. The value is encrypted before

        being stored.

        '
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/LinkedAccountIdHeader'
      - name: linked_account_id
        in: query
        required: false
        schema:
          type: string
        description: Used when authenticating via API key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertDefaultAppCredentialRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultAppCredentialActionResponse'
    delete:
      operationId: deleteDefaultAppAuthCredential
      tags:
      - Credentials
      summary: Delete one auth credential on the org's default app
      description: Removes the named credential key from the linked account's default-app credentials.
        Returns 404 if the key does not exist.
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/LinkedAccountIdHeader'
      - name: linked_account_id
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccess'
  /api/v2/public/linked-account/integration/save-key-credentials/{slug}:
    put:
      operationId: saveKeyBasedAppCredentials
      tags:
      - Credentials
      summary: Save key-based credentials for an app
      description: Save key-based credentials for the app on this linked account. The app must support
        key-based authentication. The request body holds the credential fields defined by the app's authentication
        schema.
      security:
      - ApiKeyAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: auth_type
        in: query
        required: false
        schema:
          type: string
        description: Override the app's default auth_type.
      - $ref: '#/components/parameters/LinkedAccountIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Free-form auth_data; shape determined by the target app.
      responses:
        '200':
          description: OK — response shape varies per app.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v2/public/migrate-token:
    put:
      operationId: migrateTokenForLinkedAccount
      tags:
      - Credentials
      summary: Migrate an auth_object onto a linked account's integration
      description: 'Validates `auth_object` against the named app''s auth schema, encrypts each value,

        and either creates a new integration or updates the existing one on the linked

        account (identified by the `linked_account_id` header). Only non-custom apps

        are supported.

        '
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/LinkedAccountIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrateTokenResponse'
  /api/v2/public/hosted-properties:
    get:
      operationId: getHostedProperties
      tags:
      - Hosted Properties
      summary: Read hosted properties stashed by `/connect-url`
      description: Returns the properties stored for the current Connect session by `POST /connect-url`.
      security:
      - BearerAuth: []
      responses:
        '200':
          description: OK — the properties stored by `POST /connect-url`.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/v2/public/linked-account:
    get:
      operationId: listLinkedAccounts
      tags:
      - Linked Accounts
      summary: List linked accounts for the org
      description: 'Returns a paginated list of linked accounts for the org+environment derived from

        the API key. `integrations[*].credentials`, `authTokens`, and `connections` are

        stripped from each document.

        '
      security:
      - ApiKeyAuth: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
      - name: env_variable_name
        in: query
        schema:
          type: string
      - name: env_variable_value
        in: query
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLinkedAccounts'
    post:
      operationId: createLinkedAccount
      tags:
      - Linked Accounts
      summary: Create a linked account
      description: 'Creates a linked account under the org+environment derived from the API key.

        Optionally seeds a custom default-app integration via `your_app.auth_credentials`

        and UDF key/values. Distributed Redlock is taken around the create.

        '
      security:
      - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkedAccountRequest'
      responses:
        '200':
          description: OK — returns the linked account (without `integrations`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkedAccount'
    put:
      operationId: upsertLinkedAccount
      tags:
      - Linked Accounts
      summary: Update or create a linked account
      description: 'Upserts a linked account. If authenticated via session JWT, the linked-account id

        comes from the token; otherwise from the body''s `account_id` / `linked_account_id`.

        Body fields may be flat or nested under `payload`.

        '
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertLinkedAccountRequest'
      responses:
        '200':
          description: OK — returns the linked account (without `integrations`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkedAccount'
  /api/v2/public/linked-account/{linked_account_id}:
    get:
      operationId: getLinkedAccountById
      tags:
      - Linked Accounts
      summary: Get a linked account by id
      description: 'Returns the linked account matching the path id. `integrations[*].credentials`,

        `authTokens`, and `connections` are stripped from the response.

        '
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      parameters:
      - name: linked_account_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkedAccount'
    delete:
      operationId: deleteLinkedAccount
      tags:
      - Linked Accounts
      summary: Delete a linked account
      description: 'Deletes the linked account: revokes all of its integration tokens, removes the associated
        workflow installations, and invalidates any access tokens issued to it. The configured test user
        cannot be deleted in the `test` environment.'
      security:
      - ApiKeyAuth: []
      parameters:
      - name: linked_account_id
        in: path
        required: true
        schema:
