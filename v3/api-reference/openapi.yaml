        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerEventJsonRequest'
          multipart/form-data:
            schema:
              type: object
              properties:
                event:
                  type: string
                trigger:
                  type: string
                payload:
                  type: string
                  description: JSON-stringified payload. File fields (any names) merge into the payload.
              additionalProperties:
                type: string
                format: binary
                description: Any file field name is accepted; uploads merge into payload under their field
                  names.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookFiredResponse'
