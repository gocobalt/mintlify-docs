<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="720" viewBox="0 0 900 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="720" fill="#0A0A0A"/>
  
  <!-- Arrow Definitions -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22C55E"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FACC15"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F97316"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#737373"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="35" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle">SDK Integration Flow</text>
  
  <!-- Column Headers -->
  <rect x="40" y="55" width="260" height="35" rx="6" fill="#1F1F1F"/>
  <text x="170" y="78" fill="#22C55E" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Your Backend</text>
  
  <rect x="320" y="55" width="260" height="35" rx="6" fill="#1F1F1F"/>
  <text x="450" y="78" fill="#FACC15" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Your Frontend</text>
  
  <rect x="600" y="55" width="260" height="35" rx="6" fill="#1F1F1F"/>
  <text x="730" y="78" fill="#F97316" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Refold Platform</text>
  
  <!-- Vertical Lane Dividers -->
  <line x1="310" y1="100" x2="310" y2="660" stroke="#262626" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="590" y1="100" x2="590" y2="660" stroke="#262626" stroke-width="1" stroke-dasharray="4 4"/>
  
  <!-- STEP 1: Create Linked Account -->
  <rect x="50" y="115" width="240" height="70" rx="8" fill="#111111" stroke="#22C55E" stroke-width="2"/>
  <rect x="50" y="115" width="30" height="70" rx="8" fill="#22C55E"/>
  <rect x="72" y="115" width="8" height="70" fill="#111111"/>
  <text x="65" y="157" fill="#0A0A0A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="180" y="145" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Create Linked Account</text>
  <text x="180" y="165" fill="#737373" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Node.js SDK: .createLinkedAccount()</text>
  
  <!-- Arrow 1 to Refold -->
  <path d="M290 150 L600 150" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Refold stores account -->
  <rect x="610" y="130" width="240" height="40" rx="6" fill="#1A1A1A" stroke="#F97316" stroke-width="1"/>
  <text x="730" y="155" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Stores linked account data</text>
  
  <!-- STEP 2: Generate Session Token -->
  <rect x="50" y="205" width="240" height="70" rx="8" fill="#111111" stroke="#22C55E" stroke-width="2"/>
  <rect x="50" y="205" width="30" height="70" rx="8" fill="#22C55E"/>
  <rect x="72" y="205" width="8" height="70" fill="#111111"/>
  <text x="65" y="247" fill="#0A0A0A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="180" y="235" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Generate Session Token</text>
  <text x="180" y="255" fill="#737373" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Node.js SDK: .getTokenForLinkedAccount()</text>
  
  <!-- Arrow 2 to Refold and back -->
  <path d="M290 230 L600 230" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M600 250 L290 250" stroke="#737373" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrowGray)"/>
  
  <!-- Refold returns token -->
  <rect x="610" y="220" width="240" height="40" rx="6" fill="#1A1A1A" stroke="#F97316" stroke-width="1"/>
  <text x="730" y="245" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Returns session token (24h expiry)</text>
  
  <!-- Arrow from Backend to Frontend (token handoff) -->
  <path d="M170 275 L170 300 L450 300 L450 320" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="255" y="287" width="110" height="20" rx="3" fill="#0A0A0A"/>
  <text x="310" y="301" fill="#4ADE80" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">Pass token via API</text>
  
  <!-- STEP 3: Initialize Frontend SDK -->
  <rect x="330" y="325" width="240" height="70" rx="8" fill="#111111" stroke="#FACC15" stroke-width="2"/>
  <rect x="330" y="325" width="30" height="70" rx="8" fill="#FACC15"/>
  <rect x="352" y="325" width="8" height="70" fill="#111111"/>
  <text x="345" y="367" fill="#0A0A0A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="460" y="355" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Initialize Frontend SDK</text>
  <text x="460" y="375" fill="#737373" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">new Cobalt({ token })</text>
  
  <!-- STEP 4: User Connects App -->
  <rect x="330" y="415" width="240" height="70" rx="8" fill="#111111" stroke="#FACC15" stroke-width="2"/>
  <rect x="330" y="415" width="30" height="70" rx="8" fill="#FACC15"/>
  <rect x="352" y="415" width="8" height="70" fill="#111111"/>
  <text x="345" y="457" fill="#0A0A0A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">4</text>
  <text x="460" y="445" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">User Connects Application</text>
  <text x="460" y="465" fill="#737373" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">JS SDK: .connect({ slug, authConfig })</text>
  
  <!-- Arrow 4 to Refold -->
  <path d="M570 450 L600 450" stroke="#FACC15" stroke-width="2" marker-end="url(#arrowYellow)"/>
  
  <!-- Refold handles OAuth -->
  <rect x="610" y="415" width="240" height="70" rx="6" fill="#1A1A1A" stroke="#F97316" stroke-width="1"/>
  <text x="730" y="443" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Handles OAuth flow or</text>
  <text x="730" y="457" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">stores API credentials</text>
  <text x="730" y="475" fill="#F97316" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">→ Connects to third-party app</text>
  
  <!-- STEP 5: Configure Workflows -->
  <rect x="330" y="505" width="240" height="70" rx="8" fill="#111111" stroke="#FACC15" stroke-width="2"/>
  <rect x="330" y="505" width="30" height="70" rx="8" fill="#FACC15"/>
  <rect x="352" y="505" width="8" height="70" fill="#111111"/>
  <text x="345" y="547" fill="#0A0A0A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">5</text>
  <text x="460" y="535" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Configure Workflows</text>
  <text x="460" y="555" fill="#737373" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">JS SDK: .config() → .updateConfig()</text>
  
  <!-- Arrow 5 to Refold -->
  <path d="M570 540 L600 540" stroke="#FACC15" stroke-width="2" marker-end="url(#arrowYellow)"/>
  
  <!-- Refold saves config -->
  <rect x="610" y="505" width="240" height="70" rx="6" fill="#1A1A1A" stroke="#F97316" stroke-width="1"/>
  <text x="730" y="533" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Saves field mappings and</text>
  <text x="730" y="547" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">workflow settings</text>
  <text x="730" y="565" fill="#F97316" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">→ Workflows ready to execute</text>
  
  <!-- STEP 6: Trigger Events -->
  <rect x="50" y="595" width="240" height="70" rx="8" fill="#111111" stroke="#22C55E" stroke-width="2"/>
  <rect x="50" y="595" width="30" height="70" rx="8" fill="#22C55E"/>
  <rect x="72" y="595" width="8" height="70" fill="#111111"/>
  <text x="65" y="637" fill="#0A0A0A" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">6</text>
  <text x="180" y="625" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Trigger Workflow Events</text>
  <text x="180" y="645" fill="#737373" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Node.js SDK: .event({ event, payload })</text>
  
  <!-- Arrow 6 to Refold -->
  <path d="M290 630 L600 630" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Refold executes workflow -->
  <rect x="610" y="595" width="240" height="70" rx="6" fill="#1A1A1A" stroke="#F97316" stroke-width="1"/>
  <text x="730" y="623" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Executes workflow with</text>
  <text x="730" y="637" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">user's configuration</text>
  <text x="730" y="655" fill="#F97316" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">→ Syncs data to third-party app</text>
  
  <!-- Legend -->
  <rect x="40" y="680" width="820" height="30" rx="6" fill="#111111"/>
  
  <circle cx="70" cy="695" r="6" fill="#22C55E"/>
  <text x="85" y="699" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10">Node.js SDK</text>
  
  <circle cx="180" cy="695" r="6" fill="#FACC15"/>
  <text x="195" y="699" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10">JavaScript / React SDK</text>
  
  <circle cx="330" cy="695" r="6" fill="#F97316"/>
  <text x="345" y="699" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10">Refold Platform</text>
  
  <line x1="450" y1="695" x2="480" y2="695" stroke="#22C55E" stroke-width="2"/>
  <text x="490" y="699" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10">Request</text>
  
  <line x1="550" y1="695" x2="580" y2="695" stroke="#737373" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="590" y="699" fill="#A3A3A3" font-family="Inter, system-ui, sans-serif" font-size="10">Response</text>
  
  <text x="680" y="699" fill="#525252" font-family="Inter, system-ui, sans-serif" font-size="10">Steps 1-2: Setup</text>
  <text x="780" y="699" fill="#525252" font-family="Inter, system-ui, sans-serif" font-size="10">Steps 3-6: Runtime</text>
</svg>
